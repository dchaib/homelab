---
- name: Setup
  hosts: all
  roles:
    - users
    - ufw
    - docker
    - docker_networks
    - cron

- name: Deploy Docker stacks
  hosts: all
  handlers:
    # Restarts whichever Docker Compose stack is currently being deployed.
    #
    # HOW IT WORKS: this handler is notified by config-copying tasks in service
    # roles (e.g. "Copy configuration") for files that are bind-mounted into the
    # container and require a process restart to take effect. It relies on
    # docker_compose_config_dir, which is set by include_role: docker_compose for
    # each stack in turn. compose.yaml and .env spec changes are intentionnally NOT
    # notified here - "Start services" (docker compose up -d) handles those.
    #
    # IMPORTANT: the handler is flushed via "meta: flush_handlers" *inside*
    # roles/docker_compose/tasks/main.yml, before the "Start services" task.
    # This guarantees two things:
    #   1. The handler fires while docker_compose_config_dir still points to the
    #      current stack (not a later one that would overwrite the variable).
    #   2. "Start services" (docker compose up -d) runs after the restart, so it
    #      finds the container already running and is a no-op — no double restart.
    #
    # Do not move the flush out of roles/docker_compose/tasks/main.yml.
    - name: Restart docker compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ docker_compose_config_dir }}"
        state: restarted
      become: true
      when: ansible_check_mode is false
  roles:
    - role: prometheus
      tags:
        - prometheus
    - role: loki
      tags:
        - loki
    - role: alloy
      tags:
        - alloy
    - role: grafana
      tags:
        - grafana
    - role: freebox_exporter
      tags:
        - freebox_exporter
    - role: omada_controller
      tags:
        - omada_controller
    - role: omada_exporter
      tags:
        - omada_exporter
    - role: adguard_home
      tags:
        - adguard_home
    - role: adguard_home_exporter
      tags:
        - adguard_home_exporter
    - role: traefik
      tags:
        - traefik
    - role: pronote2calendar
      tags:
        - pronote2calendar
    - role: authelia
      tags:
        - authelia
    - role: redis_exporter
      tags:
        - redis_exporter
    - role: crowdsec
      tags:
        - crowdsec
    - role: ntfy
      tags:
        - ntfy
    - role: apprise
      tags:
        - apprise
    - role: paperless_ngx
      tags:
        - paperless_ngx
        - backup
    - role: vaultwarden
      tags:
        - vaultwarden
        - backup
    - role: healthchecks
      tags:
        - healthchecks
        - backup
    - role: healthchecks_wrapper
      tags:
        - healthchecks_wrapper

    - role: backup
      tags:
        - backup
