---
- name: Configure Docker daemon logging
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "20m",
          "max-file": "3"
        }
      }
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart docker

- name: Create Docker root directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: '{{ users.app_user.name }}'
    group: '{{ users.app_user.group }}'
    mode: '0750'
  loop:
    - "{{ docker_compose_dir }}"
    - "{{ docker_config_dir }}"
    - "{{ docker_volumes_dir }}"
  become: true
